# Secret Kubernetes cu parolele SQL Server (MSSQL_SA_PASSWORD, DB_USER_PASSWORD)
# folosite de k8s/deployment.yaml si k8s/init-job.yaml.
#
# ACESTA E UN TEMPLATE/EXEMPLU, comis in Git - valorile de mai jos NU sunt
# parole reale. "CHANGE_ME_BASE64" nu e nici macar base64 valid (contine
# underscore, in afara alfabetului base64) - `kubectl apply -f secret.yaml`
# esueaza intentionat daca il aplici asa cum e, ca sa nu ajungi din greseala
# sa rulezi cu o "parola" placeholder.
#
# Pentru un deployment real, NU edita acest fisier - copiaza
# k8s/secret.local.yaml.example in k8s/secret.local.yaml (gitignored) si
# aplica-l pe acela (vezi k8s/README.md, sectiunea 2).
#
# Cum se genereaza corect valoarea base64 pentru o parola reala:
#   echo -n 'ParolaTaReala123!' | base64
# Foloseste OBLIGATORIU -n (fara linie noua la final) - altfel newline-ul
# ajunge in parola decodata de Kubernetes si SQL Server o respinge la
# pornire, fara un mesaj de eroare evident.
apiVersion: v1
kind: Secret
metadata:
  name: sqlserver-credentials
  namespace: restaurant-datanase
type: Opaque
data:
  MSSQL_SA_PASSWORD: CHANGE_ME_BASE64
  DB_USER_PASSWORD: CHANGE_ME_BASE64
